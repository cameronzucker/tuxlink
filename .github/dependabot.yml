version: 2
updates:
  # Rust dependencies (post-Task-1 scaffold)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(cargo)"
      include: scope
    labels:
      - dependencies
      - rust
    # Block major-version proposals that are un-buildable in our environment.
    # Patch + minor updates still come through normally; only semver-major
    # bumps are suppressed.
    ignore:
      # libheif-rs 2.x pulls libheif-sys 5.x, whose build script pkg-configs
      # against the SYSTEM libheif and requires >= 1.21. Ubuntu 24.04
      # (CI / build / target) ships libheif 1.17.6, so the build script fails
      # on EVERY job (e.g. PR #727). src-tauri/Cargo.toml pins
      # `libheif-rs = "=1.0.2"` for exactly this reason. Remove this ignore if
      # the build/runtime baseline ever moves to a libheif >= 1.21.
      - dependency-name: "libheif-rs"
        update-types: ["version-update:semver-major"]
      - dependency-name: "libheif-sys"
        update-types: ["version-update:semver-major"]

  # npm dependencies (Tauri frontend)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(npm)"
      include: scope
    labels:
      - dependencies
      - npm
    # Block major-version proposals for libraries that need coordinated
    # upgrades not safe to auto-bump in isolation. Patch + minor updates
    # still come through normally; only semver-major bumps are suppressed.
    ignore:
      # vitest 4+ requires Vite 6 (imports vite/module-runner). We're on
      # Vite 5; merging would break the entire test suite. Tracked for a
      # deliberate Vite 5 → 6 + vitest 2 → 4 migration as one coordinated
      # PR (tuxlink-ztuv). Remove this ignore rule as part of that work.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      # pbf 5 is ESM-only and REMOVED the default export, splitting `Pbf` into
      # named `PbfReader` / `PbfWriter` classes. Our vendored protomaps-leaflet
      # bundle (src/vendor/protomaps-leaflet/index.js) does `import Pbf from "pbf"`
      # and constructs it, so the bump fails the vite build outright:
      #   "default" is not exported by node_modules/pbf/index.js
      # (PR #1096). This is not a shimmable rename — adopting pbf 5 means
      # RE-VENDORING protomaps-leaflet against the new API, and upstream must
      # support it first.
      #
      # Note the pin looks odd on purpose: package.json holds `pbf: ^4`, while
      # @mapbox/vector-tile@3 depends on `pbf: ^5`. pnpm installs BOTH — the
      # vendored bundle resolves to our pbf 4 (default export intact) and
      # vector-tile uses pbf 5 internally. Bumping our direct pin collapses them
      # to a single pbf 5 and breaks the vendor bundle. Leave the pin at ^4.
      #
      # Remove this ignore when protomaps-leaflet is re-vendored against pbf 5.
      - dependency-name: "pbf"
        update-types: ["version-update:semver-major"]

    # Groups bundle related packages into a SINGLE PR so peer-pair version
    # drift can't slip through. Closes the failure mode behind tuxlink-ola6:
    # dependabot bumped `react` 19.2.6 → 19.2.7 in PR #252 but left
    # `react-dom` at 19.2.6 → React 19's strict peer-parity check threw
    # at mount → app white-screened.
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tauri-apps:
        patterns:
          - "@tauri-apps/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
