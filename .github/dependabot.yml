version: 2
updates:
  # Rust dependencies (post-Task-1 scaffold)
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(cargo)"
      include: scope
    labels:
      - dependencies
      - rust

  # npm dependencies (Tauri frontend)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(npm)"
      include: scope
    labels:
      - dependencies
      - npm
    # Block major-version proposals for libraries that need coordinated
    # upgrades not safe to auto-bump in isolation. Patch + minor updates
    # still come through normally; only semver-major bumps are suppressed.
    ignore:
      # vitest 4+ requires Vite 6 (imports vite/module-runner). We're on
      # Vite 5; merging would break the entire test suite. Tracked for a
      # deliberate Vite 5 → 6 + vitest 2 → 4 migration as one coordinated
      # PR (tuxlink-ztuv). Remove this ignore rule as part of that work.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]

    # Groups bundle related packages into a SINGLE PR so peer-pair version
    # drift can't slip through. Closes the failure mode behind tuxlink-ola6:
    # dependabot bumped `react` 19.2.6 → 19.2.7 in PR #252 but left
    # `react-dom` at 19.2.6 → React 19's strict peer-parity check threw
    # at mount → app white-screened.
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tauri-apps:
        patterns:
          - "@tauri-apps/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Phoenix
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
