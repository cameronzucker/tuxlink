name: ECT (low-floor) build

# tuxlink-iuop / ADR 0020: a SEPARATE low-floor .deb for the EmComm Tools
# Community audience (ECT is frozen on Ubuntu 22.10, EOL, glibc 2.36) and Debian
# 12 Bookworm. The core release (release.yml) is unchanged and stays on the
# modern floor. This build:
#   - runs on Ubuntu 22.04 LTS (glibc 2.35 — covers ECT's 2.36 and Bookworm),
#   - compiles with `--no-default-features` so the `heif` feature is OFF (system
#     libheif >= 1.17 isn't on those distros; HEIC degrades to a clear message),
#   - overrides the .deb Depends to the low floor (libc6 >= 2.35, and drops
#     libheif/libde265/libwebp which the heif-off / vendored-webp build doesn't
#     use), so the package actually installs on the target instead of being
#     refused by the core build's libc6 (>= 2.39).
# It uploads a labeled .deb artifact and asserts it installs cleanly on a
# stock Debian Bookworm container (glibc 2.36, the same floor as ECT).

on:
  # tuxlink-b4ga: also run on release tags so the validated low-floor .deb is
  # published as a release asset (see the publish-ect job). Mirrors release.yml's
  # 'v*' tag trigger so both fire on the same release-please tag.
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/ect-build.yml'
      - 'scripts/ci/deb-install-smoke.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ect:
    name: build ECT .deb (${{ matrix.arch }}, heif off)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04, arch: amd64 }
          - { runner: ubuntu-22.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        # heif OFF → no libheif-dev/libde265-dev; webp is vendored (libwebp-sys
        # builds from source) → no libwebp-dev. Everything else matches release.yml.
        run: |
          sudo apt-get update
          sudo apt-get install -y libax25-dev libudev-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev gfortran rsync jq \
            libasound2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: etc-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            etc-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Identical voacapl staging to release.yml (the ECT build is feature-
      # complete apart from HEIC; HF prediction must still work).
      - name: Build + stage voacapl (offline HF prediction engine)
        run: |
          set -euxo pipefail
          git clone --depth=1 https://github.com/jawatson/voacapl.git /tmp/voacapl-src
          cd /tmp/voacapl-src
          find . -type f -exec touch {} +
          sleep 1; find . -name 'aclocal.m4' -exec touch {} +
          sleep 1; find . \( -name 'configure' -o -name 'config.h.in' \) -exec touch {} +
          sleep 1; find . -name 'Makefile.in' -exec touch {} +
          ./configure --prefix=/tmp/voacapl-install
          make
          make install
          /tmp/voacapl-install/bin/makeitshfbc
          test -f "$HOME/itshfbc/database/version.w32"
          cd "$GITHUB_WORKSPACE"
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          cp /tmp/voacapl-install/bin/voacapl "src-tauri/binaries/voacapl-${TRIPLE}"
          chmod +x "src-tauri/binaries/voacapl-${TRIPLE}"
          mkdir -p src-tauri/resources/itshfbc
          rsync -a "$HOME/itshfbc/" src-tauri/resources/itshfbc/

      - name: Stage go-pmtiles sidecar (region-pack extractor)
        run: |
          set -euxo pipefail
          GP_VER=1.30.3
          case "${{ matrix.arch }}" in
            amd64) GP_ARCH=x86_64 ;;
            arm64) GP_ARCH=arm64 ;;
            *) echo "unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          curl -fSL "https://github.com/protomaps/go-pmtiles/releases/download/v${GP_VER}/go-pmtiles_${GP_VER}_Linux_${GP_ARCH}.tar.gz" -o /tmp/gp.tgz
          tar xzf /tmp/gp.tgz -C /tmp pmtiles
          install -m 0755 /tmp/pmtiles "src-tauri/binaries/pmtiles-${TRIPLE}"

      # tuxlink-4zs4: bundle the ardopcf HF modem as a Tauri sidecar, BUILT FROM
      # PINNED UPSTREAM SOURCE. tuxlink's modem init needs CODEC + -G/--webgui +
      # -p, which no tagged release carries together (1.0.4.1.3 lacks CODEC;
      # 2.0.3.2.1 removed --webgui). Only the develop line has all three, so we
      # pin a develop commit and compile per-arch. GPL-3, unmodified upstream
      # source; github.com/pflarue/ardop.
      - name: Stage ardopcf sidecar (ARDOP HF modem, built from pinned source)
        run: |
          set -euxo pipefail
          ARDOP_REPO=https://github.com/pflarue/ardop
          # develop @ cb2c4c1 (1.0.4.1.3_develop): CODEC + --webgui + --ptt.
          # Validated locally vs tuxlink's exact 7-arg spawn (tuxlink-4zs4).
          ARDOP_PIN=cb2c4c1eaf906ec5914514d83aef903f4b981b43
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libasound2-dev
          rm -rf /tmp/ardop-src
          git clone --filter=blob:none "$ARDOP_REPO" /tmp/ardop-src
          git -C /tmp/ardop-src checkout --detach "$ARDOP_PIN"
          make -C /tmp/ardop-src
          test -x /tmp/ardop-src/build/linux/ardopcf
          /tmp/ardop-src/build/linux/ardopcf -h 2>&1 | grep -q -- '--webgui'
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          install -m 0755 /tmp/ardop-src/build/linux/ardopcf "src-tauri/binaries/ardopcf-${TRIPLE}"
          echo "Staged ardopcf-${TRIPLE} (built ${ARDOP_PIN}, $(du -h "src-tauri/binaries/ardopcf-${TRIPLE}" | cut -f1))"

      - name: Stage hamlib sidecar (rigctl/rigctld, static, from pinned source)
        run: |
          set -euxo pipefail
          HAMLIB_VER=4.7.2
          HAMLIB_SHA=ae1fcf2dbc80ea0786ea8f047b09399c3f7737d1930442f61a031708ed33e88f
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libusb-1.0-0-dev pkg-config
          curl -fSL "https://github.com/Hamlib/Hamlib/releases/download/${HAMLIB_VER}/hamlib-${HAMLIB_VER}.tar.gz" -o /tmp/hamlib.tar.gz
          echo "${HAMLIB_SHA}  /tmp/hamlib.tar.gz" | sha256sum -c -
          rm -rf /tmp/hamlib-src && mkdir -p /tmp/hamlib-src
          tar xzf /tmp/hamlib.tar.gz -C /tmp/hamlib-src --strip-components=1
          cd /tmp/hamlib-src
          ./configure --enable-static --disable-shared --without-readline --without-cxx-binding
          make -j"$(nproc)"
          make install-strip DESTDIR=/tmp/hamlib-install
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/resources/licenses"
          cp /tmp/hamlib-src/COPYING "$GITHUB_WORKSPACE/src-tauri/resources/licenses/hamlib-COPYING.txt"
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p "$GITHUB_WORKSPACE/src-tauri/binaries"
          for b in rigctl rigctld; do
            src="/tmp/hamlib-install/usr/local/bin/$b"
            file "$src" | grep -q ELF   # not a libtool wrapper script
            install -m 0755 "$src" "$GITHUB_WORKSPACE/src-tauri/binaries/tuxlink-${b}-${TRIPLE}"
          done
          cd "$GITHUB_WORKSPACE"
          # ldd deny-by-default (both binaries)
          allow='libc\.|libm\.|libpthread|libdl|ld-linux|linux-vdso|libusb-1\.0|libudev|libcap'
          for b in tuxlink-rigctl tuxlink-rigctld; do
            bin="src-tauri/binaries/${b}-${TRIPLE}"
            ldd "$bin" | awk '{print $1}' | sed 's#^/.*/##' | grep -vE "^($allow)" | grep . && { echo "FORBIDDEN lib in $b"; exit 1; } || true
            ldd "$bin" | grep -iE 'libhamlib|readline|tinfo|ncurses|gpiod|xml2' && { echo "FORBIDDEN hamlib/readline in $b"; exit 1; } || true
            # GLIBC floor: ECT runner is glibc 2.35 -> assert no symbol newer than 2.35
            maxglibc="$(readelf --version-info "$bin" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -uV | tail -1)"
            printf '%s\n2.35\n' "${maxglibc#GLIBC_}" | sort -CV || { echo "$b needs $maxglibc > ECT floor 2.35"; exit 1; }
          done
          # capability: FT-710 + G90 + FTX-1 (Yaesu FTX-1, hamlib 4.7 model 1051) backends compiled in
          "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" -m 1049 --dump-caps | grep -qi 'Model name.*FT-710'
          "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" -m 3088 --dump-caps | grep -qi 'Model name.*G90'
          "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" -m 1051 --dump-caps | grep -qi 'Model name.*FTX-1'
          # functional: dummy backend set/get freq
          "src-tauri/binaries/tuxlink-rigctld-${TRIPLE}" -m 1 -t 4590 & dp=$!; sleep 1
          "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" -m 2 -r localhost:4590 F 14074000
          # `rigctl -m 2` prints a "rigctld: Hamlib ..." banner before the value,
          # so match the exact frequency line rather than the whole capture.
          "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" -m 2 -r localhost:4590 f | grep -qx 14074000
          kill "$dp" 2>/dev/null || true
          du -h "src-tauri/binaries/tuxlink-rigctl-${TRIPLE}" "src-tauri/binaries/tuxlink-rigctld-${TRIPLE}"

      # Same externalBin + resources inject as release.yml, PLUS a low-floor
      # Depends override: libc6 (>= 2.35) for the jammy build, and drop
      # libheif1/libde265-0 (heif off) and libwebp7 (webp vendored) which the
      # core list carries. Without this the .deb would inherit libc6 (>= 2.39)
      # and be refused on the exact ECT/Bookworm target it is built for.
      - name: Inject bundle config + low-floor Depends (CI-only)
        run: |
          set -euxo pipefail
          cd src-tauri
          jq '.bundle.externalBin = ["binaries/voacapl", "binaries/pmtiles", "binaries/ardopcf", "binaries/tuxlink-rigctl", "binaries/tuxlink-rigctld"]
              | .bundle.resources = ["resources/wle-forms/**/*", "resources/itshfbc/**/*", "resources/propagation/ssn-forecast.json", "resources/basemap/**/*", "resources/licenses/**/*"]
              | .bundle.linux.deb.depends = ["libc6 (>= 2.35)", "libsecret-1-0", "libusb-1.0-0", "libudev1", "libcap2"]' \
             tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          echo "ECT bundle config:"; jq '{externalBin: .bundle.externalBin, depends: .bundle.linux.deb.depends}' tauri.conf.json

      - name: Lint docs links
        run: pnpm lint:docs

      - name: Build + bundle .deb (heif feature OFF)
        # `tauri build` has NO --no-default-features flag (only -f/--features,
        # which is additive), so disable the crate's default `heif` feature with
        # a CI-only edit of Cargo.toml. Mainline keeps `default = ["heif"]` (HEIC
        # on for devs + the core release); this edit is never committed. With
        # default = [], `pnpm tauri build` compiles cargo with no default
        # features → libheif-rs is not built and no system libheif >= 1.17 needed.
        run: |
          set -euxo pipefail
          sed -i 's/^default = \["heif"\]/default = []/' src-tauri/Cargo.toml
          grep -qE '^default = \[\]' src-tauri/Cargo.toml \
            || { echo "ERROR: heif feature-flip did not take"; exit 1; }
          pnpm tauri build --bundles deb

      - name: Verify voacapl + pmtiles + ardopcf + itshfbc + basemap bundled
        run: |
          set -euxo pipefail
          deb="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)"
          test -n "$deb"
          rm -rf /tmp/deb-extract && mkdir -p /tmp/deb-extract
          dpkg-deb -x "$deb" /tmp/deb-extract
          main="$(find /tmp/deb-extract -type f -name tuxlink | head -1)"
          test -x "$(dirname "$main")/voacapl"
          test -x "$(dirname "$main")/pmtiles"
          test -x "$(dirname "$main")/ardopcf"   # tuxlink-vbpy: ARDOP HF modem must ship
          test -x "$(dirname "$main")/tuxlink-rigctl"
          test -x "$(dirname "$main")/tuxlink-rigctld"
          find /tmp/deb-extract -path '*resources/itshfbc/database/version.w32' | grep -q version.w32
          find /tmp/deb-extract -path '*resources/basemap/world-z0-6.pmtiles' | grep -q world-z0-6.pmtiles

      - name: Label + collect the ECT .deb
        run: |
          set -euxo pipefail
          deb="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)"
          test -n "$deb"
          mkdir -p dist-ect
          # Mark the variant so it can't be confused with the core .deb. The
          # internal package name/version are unchanged; only the filename differs.
          base="$(basename "$deb" .deb)"
          cp "$deb" "dist-ect/${base}_ect.deb"
          ls -lh dist-ect

      - name: Upload ECT .deb
        uses: actions/upload-artifact@v7
        with:
          name: tuxlink-ect-${{ matrix.arch }}
          path: dist-ect/*
          retention-days: 14

  ect-install-test:
    name: ECT .deb installs on clean debian:bookworm (${{ matrix.arch }})
    needs: build-ect
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04, arch: amd64 }
          - { runner: ubuntu-22.04-arm, arch: arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Download the ECT .deb
        uses: actions/download-artifact@v8
        with:
          name: tuxlink-ect-${{ matrix.arch }}
          path: debs

      - name: Install on clean debian:bookworm (glibc 2.36 — ECT's floor) and assert
        run: |
          set -euxo pipefail
          deb="$(ls debs/tuxlink_*_${{ matrix.arch }}_ect.deb | head -1)"
          test -n "$deb"
          # Bookworm shares ECT's glibc 2.36 floor and has webkit2gtk-4.1, so it
          # is the clean, available proxy for "does the ECT build install + its
          # libs resolve on the low floor". (install mode: expect success.)
          docker run --rm \
            -v "$PWD:/work" -w /work \
            "debian:bookworm-slim" \
            bash scripts/ci/deb-install-smoke.sh "$deb" install

      - name: Install on debian:bookworm that ALREADY has system hamlib (tuxlink-hs2k R2 collision guard)
        run: |
          set -euxo pipefail
          deb="$(ls debs/tuxlink_*_${{ matrix.arch }}_ect.deb | head -1)"
          test -n "$deb"
          # Direct regression guard for the R2 collision: a container that
          # already has libhamlib-utils (so /usr/bin/rigctld exists) BEFORE
          # Tuxlink installs its own bundled tuxlink-rigctl/tuxlink-rigctld.
          docker run --rm \
            -v "$PWD:/work" -w /work \
            "debian:bookworm-slim" \
            bash scripts/ci/deb-install-smoke.sh "$deb" hamlib-present

  # tuxlink-b4ga / ADR 0020: publish the validated low-floor .deb as a release
  # asset so EmComm Tools Community (Ubuntu 22.10 EOL, glibc 2.36) and Debian 12
  # Bookworm users have a downloadable install — the core release .deb refuses on
  # that floor (libc6 >= 2.39). Runs ONLY on a release tag, and ONLY after
  # ect-install-test proves the .deb installs on the low floor, so a broken
  # low-floor build never reaches a release. Uses the same softprops upsert as
  # release.yml, so it attaches to the same tag's release no matter which
  # workflow creates it first (no cross-workflow race). A failure here leaves the
  # core release.yml assets untouched — the ECT .deb just won't be attached.
  publish-ect:
    name: Publish ECT .deb to the release
    needs: [build-ect, ect-install-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download the ECT .debs (all arches)
        uses: actions/download-artifact@v8
        with:
          pattern: tuxlink-ect-*
          path: dist-ect
          merge-multiple: true

      - name: List collected ECT .debs
        run: ls -lh dist-ect

      - name: Attach ECT .deb(s) to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: dist-ect/*_ect.deb
          fail_on_unmatched_files: true
          # Match release.yml: a tag this workflow reaches first creates the
          # release as a pre-release; promote-release.yml flips stable later.
          prerelease: true
