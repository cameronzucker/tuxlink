name: CI

on:
  pull_request:
    branches:
      - main
      - feat/v0.0.1
  push:
    branches:
      - main
      - feat/v0.0.1

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    # The amd64 cold clippy --all-targets + test sits right at 30 min on
    # ubuntu-latest (arm64 finishes in ~14). With the system-dep apt closure now
    # cached (tuxlink-4est), the common run spends seconds on deps; 55 leaves the
    # rare cold-cache run headroom for the re-download plus a cold compile.
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7

      - name: Harden apt + refresh the package index
        # tuxlink-84vzn: refresh the apt index BEFORE the deps action. The runner
        # image bakes a package index that goes stale when Ubuntu ships a
        # point-release: the old .deb (e.g. libnghttp2-dev=…ubuntu0.3, a curl dep)
        # is pulled from the mirror while the index still pins it, so the fetch
        # 404s and the WHOLE apt install aborts ("No packages to install") — which
        # is what broke every build on 2026-07-05. `apt-get update` re-resolves
        # against the current mirror so the fetch succeeds.
        run: |
          echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/99retries
          sudo apt-get update

      # libsecret-1-dev intentionally omitted: src-tauri/Cargo.toml configures
      # keyring 3.6.3 with default-features = false and features =
      # ["sync-secret-service", "crypto-rust"] — both pure-Rust, no build-time
      # link against libsecret. Runtime secret-service is a user-session daemon
      # (declared as a Depends on the .deb produced by release.yml).
      - name: Install system dependencies (cached)
        # tuxlink-4est: cache the ~100-package webkit/gtk dev closure so a slow
        # Ubuntu mirror can't re-eat the job timeout downloading it every run
        # (PR #816's verify amd64 was cancelled mid-apt at 45m16s). Restores in
        # ~10s on a cache hit; the arch-scoped version salt keeps amd64/arm64
        # caches separate and lets a bump force a refresh.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # tuxlink-84vzn: list the GTK/glib dev closure EXPLICITLY. These are only
          # transitive Depends of libwebkit2gtk-4.1-dev, and the 2026-07-05 runner
          # image no longer ships them preinstalled — the cache action did not
          # restore the transitive `.pc` providers, so `pkg-config glib-2.0` failed
          # ("Package glib-2.0 was not found") and every Rust build (glib-sys) broke.
          # libgtk-3-dev pulls the cairo/pango/gdk-pixbuf/atk/glib dev stack.
          # wsjtx (jt9 decode oracle for the tuxlink-jt9 e2e tests, tuxlink-b026z.2
          # T8): NOTE the action installs with plain `apt install` (recommends
          # included), so a cold cache pulls wsjtx's full Qt closure once; cache
          # hits amortize it. jt9 ships in the main wsjtx package via hard
          # Depends on both amd64 and arm64 (noble universe).
          packages: libax25-dev libudev-dev libwebkit2gtk-4.1-dev libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libheif-dev libde265-dev libwebp-dev wsjtx libasound2-dev
          # Salt bump forces a fresh apt closure. v3: v2 cached an EMPTY result
          # after the 404-aborted install, so it must be discarded too (tuxlink-84vzn).
          # v4: adds wsjtx (tuxlink-b026z.2 T8).
          # v5: adds libasound2-dev (alsa crate, tuxlink-b026z.3 — pulled forward from T18 at the Gate D CI failure).
          version: tuxlink-ci-${{ matrix.arch }}-v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        # Separate cache namespace from release.yml (which uses
        # ${{ runner.os }}-${{ matrix.arch }}-tuxlink-...). Cargo's
        # target/debug and target/release directories are fingerprint-
        # separated, so cross-pollination is correctness-safe, but
        # the eviction economics differ: CI cache fills with debug/
        # test artifacts that don't help release builds and vice versa.
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ci-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ci-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm typecheck

      - name: Frontend tests (vitest)
        run: pnpm vitest run

      - name: Frontend production build (tsc + vite build)
        # Catches Vite production-build failures that tsc + vitest miss.
        run: pnpm build

      - name: jt9/WSJT-X provenance guard (tuxlink-b026z.7)
        run: bash scripts/check-jt9-provenance.sh

      - name: Rust lint (clippy --workspace --all-targets --locked -D warnings)
        # --workspace lints ALL members (tuxlink-security, tuxlink-mcp-core,
        # tuxlink-mcp, tuxlink-mcp-testserver), not just the default-members=["."]
        # tuxlink package. The release build below stays package-scoped.
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --workspace --all-targets --locked -- -D warnings

      - name: jt9 smoke check (decode oracle for tuxlink-jt9 e2e)
        run: test -x /usr/bin/jt9

      - name: Rust tests
        # --workspace runs the new crates' unit tests too (without it,
        # default-members=["."] skips them).
        run: cargo test --manifest-path src-tauri/Cargo.toml --workspace --locked --verbose
        # NB: the heif-off (ECT/low-floor) compile path is covered end-to-end by
        # ect-build.yml (a full --no-default-features tauri build + install-test),
        # so it is intentionally NOT re-checked here — that extra cargo check
        # pushed the already-tight amd64 verify past its timeout (tuxlink-iuop).
