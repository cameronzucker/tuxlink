name: Release build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/v0.0.1
      - main
    paths:
      - 'src-tauri/**'
      - 'external/tuxlink-pat'
      - '.gitmodules'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libax25-dev libudev-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Go (version from Pat's go.mod)
        uses: actions/setup-go@v6
        with:
          go-version-file: 'external/tuxlink-pat/go.mod'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + Pat build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            external/tuxlink-pat/.build
          key: ${{ runner.os }}-tuxlink-${{ hashFiles('src-tauri/Cargo.lock') }}-${{ hashFiles('external/tuxlink-pat/**') }}
          restore-keys: |
            ${{ runner.os }}-tuxlink-

      - name: Build release (triggers build.rs Pat sidecar build)
        # Validates the release-profile build path (Go toolchain + submodule +
        # build.rs sidecar production) on every PR that touches the integration
        # surface — without this, the release-only Go path is untested until a
        # `v*` tag triggers a publish. Full AppImage bundling (cargo tauri
        # build --bundles appimage + artifact upload) is owned by v0.0.1
        # plan Task 19, not this PR (per spec §3.2 fork-setup scope).
        run: |
          cd src-tauri
          cargo build --release
