name: Release build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/v0.0.1
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/user-guide/**'
      - 'scripts/lint-docs-links.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libax25-dev libudev-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-tuxlink-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-tuxlink-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # tuxlink-hhxs: bundle the U1 offline-HF-prediction engine. voacapl is a
      # Fortran source build, so it produces an arch-specific binary — built
      # natively on each matrix runner (Option A per docs/reference/voacapl-ci-bundling.md;
      # the arm64 runner already exists in the matrix). itshfbc is arch-neutral
      # coefficient data generated by makeitshfbc. Both land where the app's
      # startup resolves them (src-tauri/src/lib.rs): voacapl adjacent to the main
      # binary (externalBin), itshfbc under the Resource dir (resources glob).
      - name: Build + stage voacapl (offline HF prediction engine)
        run: |
          set -euxo pipefail
          sudo apt-get install -y gfortran
          git clone --depth=1 https://github.com/jawatson/voacapl.git /tmp/voacapl-src
          cd /tmp/voacapl-src
          # A fresh clone gives every file the same mtime, so make's autotools
          # maintainer-mode rules think aclocal.m4/configure/Makefile.in are stale
          # and try to re-run aclocal-1.15 (not installed) → Error 127. Touch the
          # shipped generated files strictly newer than their sources, in
          # dependency order, so make treats them as up-to-date and never
          # regenerates them. (No autotools install needed.)
          find . -type f -exec touch {} +
          sleep 1; find . -name 'aclocal.m4' -exec touch {} +
          sleep 1; find . \( -name 'configure' -o -name 'config.h.in' \) -exec touch {} +
          sleep 1; find . -name 'Makefile.in' -exec touch {} +
          ./configure --prefix=/tmp/voacapl-install
          # Serial build (no -j): an itshfbc helper tool (anttyp99) compiles
          # Fortran sources that `use Cant99` before cant99.mod exists under
          # parallel make — the Makefile omits the .mod dependency, so -j races.
          # voacapl builds in well under a minute, so serial costs nothing.
          make
          make install
          # makeitshfbc populates $HOME/itshfbc by default (coeffs/antennas/database/geo*).
          /tmp/voacapl-install/bin/makeitshfbc
          test -f "$HOME/itshfbc/database/version.w32"
          cd "$GITHUB_WORKSPACE"
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          cp /tmp/voacapl-install/bin/voacapl "src-tauri/binaries/voacapl-${TRIPLE}"
          chmod +x "src-tauri/binaries/voacapl-${TRIPLE}"
          mkdir -p src-tauri/resources/itshfbc
          rsync -a "$HOME/itshfbc/" src-tauri/resources/itshfbc/
          echo "Staged voacapl-${TRIPLE} ($(du -h "src-tauri/binaries/voacapl-${TRIPLE}" | cut -f1)) + itshfbc ($(du -sh src-tauri/resources/itshfbc | cut -f1))"

      # Inject externalBin + the itshfbc resource glob — CI-ONLY, never committed.
      # tauri-build validates externalBin existence at cargo-build time, so these
      # entries in the committed tauri.conf.json would break the `verify` gate on
      # runners that haven't staged the binary. See docs/reference/voacapl-ci-bundling.md.
      - name: Inject voacapl bundle config (CI-only)
        run: |
          set -euxo pipefail
          cd src-tauri
          jq '.bundle.externalBin = ["binaries/voacapl"]
              | .bundle.resources = ["resources/wle-forms/**/*", "resources/itshfbc/**/*", "resources/propagation/ssn-forecast.json"]' \
             tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          echo "Patched bundle config:"; jq '{externalBin: .bundle.externalBin, resources: .bundle.resources}' tauri.conf.json

      - name: Lint docs links
        run: pnpm lint:docs

      - name: Build + bundle (deb, rpm, AppImage)
        run: pnpm tauri build --bundles deb,rpm,appimage

      # Production-mount-path check: the .deb must place voacapl ADJACENT to the
      # main binary (current_exe()/voacapl) and itshfbc under the Resource dir,
      # or prediction silently degrades to Unavailable in the installed app.
      - name: Verify voacapl + itshfbc bundled where the app resolves them
        run: |
          set -euxo pipefail
          deb="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)"
          test -n "$deb"
          rm -rf /tmp/deb-extract && mkdir -p /tmp/deb-extract
          dpkg-deb -x "$deb" /tmp/deb-extract
          main="$(find /tmp/deb-extract -type f -name tuxlink | head -1)"
          test -n "$main"
          test -x "$(dirname "$main")/voacapl"   # sidecar adjacent to the main binary
          find /tmp/deb-extract -path '*resources/itshfbc/database/version.w32' | grep -q version.w32
          echo "OK: voacapl adjacent to $main; itshfbc present under resources/"

      - name: Collect bundle artifacts
        run: |
          bundle_dir=src-tauri/target/release/bundle
          out_dir=dist-artifacts
          mkdir -p "$out_dir"
          find "$bundle_dir/deb" -name "*.deb" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/rpm" -name "*.rpm" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/appimage" -name "*.AppImage" -exec cp {} "$out_dir/" \;
          ls -lh "$out_dir"

      - name: Compute SHA256 sums
        run: |
          cd dist-artifacts
          sha256sum *.deb *.rpm *.AppImage > SHA256SUMS-${{ matrix.arch }}
          cat SHA256SUMS-${{ matrix.arch }}

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundles-${{ matrix.arch }}
          path: dist-artifacts/*
          retention-days: 7

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist-artifacts/*
          fail_on_unmatched_files: true
          # Two-channel releases: every auto-cut (nightly) release is a GitHub
          # pre-release, so it never claims the "Latest" badge / releases/latest
          # API. Casual visitors always see the last STABLE release that an
          # operator promoted via promote-release.yml (gh release edit --latest).
          prerelease: true

      # Belt-and-suspenders: guarantee the pre-release flag even if the action
      # above only honors `prerelease` on create (not on update of an existing
      # release that release-please already opened). Idempotent. This flag is the
      # whole point of the two-channel split, and it can't be smoke-tested ahead
      # of a real release, so we enforce it explicitly.
      - name: Enforce pre-release flag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --prerelease
