name: Release build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/v0.0.1
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/user-guide/**'
      - 'scripts/lint-docs-links.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libax25-dev libudev-dev libwebkit2gtk-4.1-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # alpha-logging (tuxlink-qjgx) introduced the xtask crate as a
          # workspace member, so cargo now writes Cargo.lock + target/ at the
          # workspace root instead of src-tauri/.
          key: ${{ runner.os }}-${{ matrix.arch }}-tuxlink-${{ hashFiles('Cargo.lock', 'src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-tuxlink-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint docs links
        run: pnpm lint:docs

      - name: Build + bundle (deb, rpm, AppImage)
        run: pnpm tauri build --bundles deb,rpm,appimage

      - name: Collect bundle artifacts
        run: |
          # alpha-logging (tuxlink-qjgx) workspace lives at the repo root,
          # so cargo's target/ landed at the workspace root rather than
          # src-tauri/target/. Tauri bundle output follows.
          bundle_dir=target/release/bundle
          out_dir=dist-artifacts
          mkdir -p "$out_dir"
          find "$bundle_dir/deb" -name "*.deb" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/rpm" -name "*.rpm" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/appimage" -name "*.AppImage" -exec cp {} "$out_dir/" \;
          ls -lh "$out_dir"

      - name: Compute SHA256 sums
        run: |
          cd dist-artifacts
          sha256sum *.deb *.rpm *.AppImage > SHA256SUMS-${{ matrix.arch }}
          cat SHA256SUMS-${{ matrix.arch }}

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles-${{ matrix.arch }}
          path: dist-artifacts/*
          retention-days: 7

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
          fail_on_unmatched_files: true
