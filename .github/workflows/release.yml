name: Release build

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - feat/v0.0.1
      - main
    paths:
      - 'src-tauri/**'
      - 'src/**'
      - 'scripts/**'
      - 'docs/user-guide/**'
      - 'scripts/lint-docs-links.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      # tuxlink-kcf0: harden against transient crates.io download failures.
      # v0.69.0's amd64 leg lost the `axum` download to an SSL "unexpected eof"
      # on a cold cache and the release half-published (arm64 only). More retries
      # + disabling HTTP/2 multiplexing is the standard crates.io-flake mitigation.
      CARGO_NET_RETRY: "10"
      CARGO_HTTP_MULTIPLEXING: "false"
    # Built on the Ubuntu 24.04 runners (glibc 2.39, libheif 1.17.6). That is the
    # effective minimum-OS floor for the published artifacts: Debian 13 Trixie+,
    # Ubuntu 24.04+, current Fedora/RHEL. Debian 12 Bookworm (glibc 2.36, libheif
    # 1.15) is below the floor on both axes — see tuxlink-iuop for the static-link
    # work real Bookworm support would need. The deb-install-test gate asserts a
    # clean apt refusal on Bookworm (via the libc6 (>= 2.39) Depends) rather than
    # a silently broken install.
    steps:
      - uses: actions/checkout@v7

      - name: Harden apt against mirror flakiness
        run: echo 'Acquire::Retries "3";' | sudo tee /etc/apt/apt.conf.d/99retries

      - name: Install system dependencies (cached)
        # tuxlink-4est: same webkit/gtk dev closure as ci.yml's verify job,
        # cached so a slow Ubuntu mirror can't stall the release build. gfortran
        # (the voacapl Fortran toolchain) stays in its own later step.
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libax25-dev libudev-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libheif-dev libde265-dev libwebp-dev
          version: tuxlink-release-${{ matrix.arch }}-v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-tuxlink-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-tuxlink-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # tuxlink-hhxs: bundle the U1 offline-HF-prediction engine. voacapl is a
      # Fortran source build, so it produces an arch-specific binary — built
      # natively on each matrix runner (Option A per docs/reference/voacapl-ci-bundling.md;
      # the arm64 runner already exists in the matrix). itshfbc is arch-neutral
      # coefficient data generated by makeitshfbc. Both land where the app's
      # startup resolves them (src-tauri/src/lib.rs): voacapl adjacent to the main
      # binary (externalBin), itshfbc under the Resource dir (resources glob).
      - name: Build + stage voacapl (offline HF prediction engine)
        run: |
          set -euxo pipefail
          sudo apt-get install -y gfortran
          git clone --depth=1 https://github.com/jawatson/voacapl.git /tmp/voacapl-src
          cd /tmp/voacapl-src
          # A fresh clone gives every file the same mtime, so make's autotools
          # maintainer-mode rules think aclocal.m4/configure/Makefile.in are stale
          # and try to re-run aclocal-1.15 (not installed) → Error 127. Touch the
          # shipped generated files strictly newer than their sources, in
          # dependency order, so make treats them as up-to-date and never
          # regenerates them. (No autotools install needed.)
          find . -type f -exec touch {} +
          sleep 1; find . -name 'aclocal.m4' -exec touch {} +
          sleep 1; find . \( -name 'configure' -o -name 'config.h.in' \) -exec touch {} +
          sleep 1; find . -name 'Makefile.in' -exec touch {} +
          ./configure --prefix=/tmp/voacapl-install
          # Serial build (no -j): an itshfbc helper tool (anttyp99) compiles
          # Fortran sources that `use Cant99` before cant99.mod exists under
          # parallel make — the Makefile omits the .mod dependency, so -j races.
          # voacapl builds in well under a minute, so serial costs nothing.
          make
          make install
          # makeitshfbc populates $HOME/itshfbc by default (coeffs/antennas/database/geo*).
          /tmp/voacapl-install/bin/makeitshfbc
          test -f "$HOME/itshfbc/database/version.w32"
          cd "$GITHUB_WORKSPACE"
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          cp /tmp/voacapl-install/bin/voacapl "src-tauri/binaries/voacapl-${TRIPLE}"
          chmod +x "src-tauri/binaries/voacapl-${TRIPLE}"
          mkdir -p src-tauri/resources/itshfbc
          rsync -a "$HOME/itshfbc/" src-tauri/resources/itshfbc/
          echo "Staged voacapl-${TRIPLE} ($(du -h "src-tauri/binaries/voacapl-${TRIPLE}" | cut -f1)) + itshfbc ($(du -sh src-tauri/resources/itshfbc | cut -f1))"

      # tuxlink-ndi4 (phase 4): bundle the go-pmtiles region-pack extractor as a
      # Tauri sidecar (externalBin). Downloaded per-arch on each matrix runner
      # (same Option-A pattern as voacapl); never committed to git (50 MB/arch).
      # The app resolves it adjacent to the main binary (current_exe()/pmtiles).
      - name: Stage go-pmtiles sidecar (region-pack extractor)
        run: |
          set -euxo pipefail
          GP_VER=1.30.3
          case "${{ matrix.arch }}" in
            amd64) GP_ARCH=x86_64 ;;
            arm64) GP_ARCH=arm64 ;;
            *) echo "unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          curl -fSL "https://github.com/protomaps/go-pmtiles/releases/download/v${GP_VER}/go-pmtiles_${GP_VER}_Linux_${GP_ARCH}.tar.gz" -o /tmp/gp.tgz
          tar xzf /tmp/gp.tgz -C /tmp pmtiles
          install -m 0755 /tmp/pmtiles "src-tauri/binaries/pmtiles-${TRIPLE}"
          echo "Staged pmtiles-${TRIPLE} ($(du -h "src-tauri/binaries/pmtiles-${TRIPLE}" | cut -f1))"

      # tuxlink-vbpy: bundle the ardopcf HF modem as a Tauri sidecar (externalBin)
      # so ARDOP HF works from a packaged install with NO separate ardopcf setup.
      # Downloaded per-arch from the upstream release (same Option-A pattern as
      # go-pmtiles); never committed. The app resolves it adjacent to the main
      # binary (current_exe()/ardopcf — see modem_commands::resolve_ardop_binary).
      # ardopcf is GPL-3; this is the UNMODIFIED upstream release binary, source at
      # https://github.com/pflarue/ardop (mere aggregation — separate process).
      - name: Stage ardopcf sidecar (ARDOP HF modem)
        run: |
          set -euxo pipefail
          AC_VER=1.0.4.1.3
          case "${{ matrix.arch }}" in
            amd64) AC_ASSET=ardopcf_amd64_Linux_64 ;;
            arm64) AC_ASSET=ardopcf_arm_Linux_64 ;;
            *) echo "unknown arch ${{ matrix.arch }}"; exit 1 ;;
          esac
          TRIPLE="$(rustc -vV | awk '/^host:/{print $2}')"
          mkdir -p src-tauri/binaries
          curl -fSL "https://github.com/pflarue/ardop/releases/download/${AC_VER}/${AC_ASSET}" -o /tmp/ardopcf
          install -m 0755 /tmp/ardopcf "src-tauri/binaries/ardopcf-${TRIPLE}"
          echo "Staged ardopcf-${TRIPLE} ($(du -h "src-tauri/binaries/ardopcf-${TRIPLE}" | cut -f1))"

      # Inject externalBin + the itshfbc/basemap resource globs — CI-ONLY, never
      # committed. tauri-build validates externalBin existence at cargo-build time,
      # so these entries in the committed tauri.conf.json would break the `verify`
      # gate on runners that haven't staged the binary. The resources list is
      # REPLACED wholesale here, so it MUST re-state every committed glob
      # (resources/basemap/**/* carries the bundled world overview + the region
      # manifest — omitting it ships a blank map). See docs/reference/voacapl-ci-bundling.md.
      - name: Inject voacapl + go-pmtiles + ardopcf bundle config (CI-only)
        run: |
          set -euxo pipefail
          cd src-tauri
          jq '.bundle.externalBin = ["binaries/voacapl", "binaries/pmtiles", "binaries/ardopcf"]
              | .bundle.resources = ["resources/wle-forms/**/*", "resources/itshfbc/**/*", "resources/propagation/ssn-forecast.json", "resources/basemap/**/*"]' \
             tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          echo "Patched bundle config:"; jq '{externalBin: .bundle.externalBin, resources: .bundle.resources}' tauri.conf.json

      - name: Lint docs links
        run: pnpm lint:docs

      - name: Build + bundle (deb, rpm, AppImage)
        run: pnpm tauri build --bundles deb,rpm,appimage

      # Production-mount-path check: the .deb must place voacapl ADJACENT to the
      # main binary (current_exe()/voacapl) and itshfbc under the Resource dir,
      # or prediction silently degrades to Unavailable in the installed app.
      - name: Verify voacapl + go-pmtiles + ardopcf + itshfbc + basemap bundled where the app resolves them
        run: |
          set -euxo pipefail
          deb="$(find src-tauri/target/release/bundle/deb -name '*.deb' | head -1)"
          test -n "$deb"
          rm -rf /tmp/deb-extract && mkdir -p /tmp/deb-extract
          dpkg-deb -x "$deb" /tmp/deb-extract
          main="$(find /tmp/deb-extract -type f -name tuxlink | head -1)"
          test -n "$main"
          test -x "$(dirname "$main")/voacapl"   # sidecar adjacent to the main binary
          test -x "$(dirname "$main")/pmtiles"   # go-pmtiles region-pack extractor, adjacent (tuxlink-ndi4)
          test -x "$(dirname "$main")/ardopcf"   # ARDOP HF modem, adjacent (tuxlink-vbpy)
          find /tmp/deb-extract -path '*resources/itshfbc/database/version.w32' | grep -q version.w32
          # tuxlink-ndi4: the bundled world overview must ship, or the map is blank.
          find /tmp/deb-extract -path '*resources/basemap/world-z0-6.pmtiles' | grep -q world-z0-6.pmtiles
          echo "OK: voacapl + pmtiles + ardopcf adjacent to $main; itshfbc + basemap present under resources/"

      - name: Collect bundle artifacts
        run: |
          bundle_dir=src-tauri/target/release/bundle
          out_dir=dist-artifacts
          mkdir -p "$out_dir"
          find "$bundle_dir/deb" -name "*.deb" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/rpm" -name "*.rpm" -exec cp {} "$out_dir/" \;
          find "$bundle_dir/appimage" -name "*.AppImage" -exec cp {} "$out_dir/" \;
          ls -lh "$out_dir"

      - name: Compute SHA256 sums
        run: |
          cd dist-artifacts
          sha256sum *.deb *.rpm *.AppImage > SHA256SUMS-${{ matrix.arch }}
          cat SHA256SUMS-${{ matrix.arch }}

      - name: Upload PR artifacts
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundles-${{ matrix.arch }}
          path: dist-artifacts/*
          retention-days: 7

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist-artifacts/*
          fail_on_unmatched_files: true
          # Two-channel releases: every auto-cut (nightly) release is a GitHub
          # pre-release, so it never claims the "Latest" badge / releases/latest
          # API. Casual visitors always see the last STABLE release that an
          # operator promoted via promote-release.yml (gh release edit --latest).
          prerelease: true

      # Belt-and-suspenders: guarantee the pre-release flag even if the action
      # above only honors `prerelease` on create (not on update of an existing
      # release that release-please already opened). Idempotent. This flag is the
      # whole point of the two-channel split, and it can't be smoke-tested ahead
      # of a real release, so we enforce it explicitly.
      - name: Enforce pre-release flag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release edit "$TAG" --prerelease

  # tuxlink-w636: validate the freshly-built .deb installs cleanly via the
  # documented `apt install ./tuxlink.deb` path on stock Debian Trixie + Bookworm
  # (amd64 + arm64), so a dependency regression fails CI instead of a tester
  # (class-prevention for GH #786). Runs only when build-linux uploaded the
  # linux-bundles artifact (PR / manual run); tag releases publish to the GitHub
  # Release instead — validate those on demand via deb-install-test.yml's
  # workflow_dispatch.
  deb-install-test:
    needs: build-linux
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deb-install-test.yml
    with:
      deb_artifact_prefix: linux-bundles

  # tuxlink-kcf0: a release is "all arches present, or it's incomplete". A
  # transient crates.io failure in one matrix leg (v0.69.0 amd64) half-published
  # silently — arm64 assets up, amd64 missing, no loud signal. This gate runs
  # after build-linux on tag releases REGARDLESS of its outcome (always()) and
  # fails the run unless BOTH arches' assets are on the release, turning a
  # half-publish into a red X with a clear "re-run the failed leg" message. The
  # per-arch SHA256SUMS is the strongest signal: each leg computes + uploads its
  # own only after its deb/rpm/appimage succeed.
  release-assets-complete:
    needs: build-linux
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Assert both arches' release assets are present
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          names="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name')"
          echo "Published assets for $TAG:"; printf '%s\n' "$names"
          missing=0
          require () {
            if ! printf '%s\n' "$names" | grep -qE "$1"; then
              echo "MISSING: $1"; missing=1
            fi
          }
          # Per-arch SHA256SUMS => that leg built AND uploaded its deb/rpm/appimage.
          require '^SHA256SUMS-amd64$'
          require '^SHA256SUMS-arm64$'
          # Primary artifact present for each arch (stable .deb arch naming).
          require '^tuxlink_.*_amd64\.deb$'
          require '^tuxlink_.*_arm64\.deb$'
          if [ "$missing" -ne 0 ]; then
            echo "::error::Release $TAG is half-published — a build-linux leg failed to upload. Re-run the failed job to complete it."
            exit 1
          fi
          echo "OK: both amd64 and arm64 assets present on $TAG."
