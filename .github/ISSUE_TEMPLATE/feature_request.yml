name: Feature request
description: Suggest a feature or enhancement
title: "[feature] "
labels: [enhancement, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Before submitting, please check:
        - The [project roadmap](https://github.com/cameronzucker/tuxlink#roadmap) for whether this is already planned.
        - Existing [issues](https://github.com/cameronzucker/tuxlink/issues?q=is%3Aissue+label%3Aenhancement) and [discussions](https://github.com/cameronzucker/tuxlink/discussions) for similar requests.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user need, not the implementation. "I can't find sent messages from last week" is more useful than "add a search bar."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How you'd like the problem solved. Sketches, mockups, or references to comparable apps welcome.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other ways to address the problem you've thought about — including doing nothing.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Affected subsystem (best guess)
      options:
        - protocol (telnet, future VARA/AX.25)
        - pat (Pat lifecycle, HTTP client)
        - wizard (first-run flow)
        - mailbox (inbox/sent)
        - compose (compose window, drafts)
        - session (session log, status)
        - menu / tray / shell (top-level UI)
        - config (config file, paths)
        - appimage (packaging, distribution)
        - docs
        - other / multiple / not sure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Anything else useful — your callsign-redacted setup, why this matters for amateur-radio operations, references, etc.
    validations:
      required: false
