[package]
name = "tuxlink"
version = "0.0.1"
description = "Linux-native full-capability Winlink client"
authors = ["Cameron Zucker <cameronzucker@gmail.com>"]
edition = "2021"
rust-version = "1.75"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json", "multipart"] }  # tuxlink-z5f: dropped "blocking" — PatClient is async to avoid runtime-drop panic in #[tokio::test] contexts
tokio = { version = "1", features = ["full"] }
nix = { version = "0.28", features = ["signal", "process"] }
thiserror = "1"            # NEW — for ConfigValidationError + ConfigReadError + ConfigWriteError
tempfile = "3"             # PROMOTED from [dev-dependencies] below
async-trait = "0.1"        # NEW (tuxlink-z5f) — WinlinkBackend trait async-fn macro for object-safety
futures = "0.3"            # NEW (tuxlink-z5f) — Stream + BoxStream for stream_log return type
tokio-stream = { version = "0.1", features = ["sync"] }  # NEW (tuxlink-z5f) — BroadcastStream wrapper
mail-parser = "0.9"        # NEW (tuxlink-y5c Task 13) — pure-Rust RFC5322/MIME parser; spec §8
chrono = { version = "0.4", default-features = false, features = ["clock"] }  # NEW (tuxlink-dm8, Task 14) — RFC3339 timestamp for message_send; `serde` unused (Codex fix)
tauri-plugin-window-state = "2"                            # NEW (tuxlink-dm8, Task 14) — per-compose-window geometry persistence (spec §8)

[dev-dependencies]
mockito = "1.5"
serial_test = "3"          # NEW — gates env-var-mutating tests

[lib]
name = "tuxlink_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "tuxlink"
path = "src/main.rs"
